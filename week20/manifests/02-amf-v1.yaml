apiVersion: v1
kind: ConfigMap
metadata:
  name: amf-v1-html
  namespace: 5g-core
data:
  index.html: |
    AMF-v1: 5G Access and Mobility Function - Stable Release
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: amf-v1
  namespace: 5g-core
  labels:
    app: amf
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amf
      version: v1
  template:
    metadata:
      labels:
        app: amf
        version: v1
    spec:
      containers:
      - name: amf
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: html
        configMap:
          name: amf-v1-html
---
apiVersion: v1
kind: Service
metadata:
  name: amf-service
  namespace: 5g-core
  labels:
    app: amf
spec:
  selector:
    app: amf
  ports:
  - name: http
    port: 80
    targetPort: 80
  type: ClusterIP