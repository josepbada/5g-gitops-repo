apiVersion: v1
kind: ConfigMap
metadata:
  name: upf-html
  namespace: 5g-core
data:
  index.html: |
    UPF: 5G User Plane Function - N4/N6 Interfaces Active
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: upf
  namespace: 5g-core
  labels:
    app: upf
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: upf
      version: v1
  template:
    metadata:
      labels:
        app: upf
        version: v1
    spec:
      containers:
      - name: upf
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: html
        configMap:
          name: upf-html
---
apiVersion: v1
kind: Service
metadata:
  name: upf-service
  namespace: 5g-core
  labels:
    app: upf
spec:
  selector:
    app: upf
  ports:
  - name: http
    port: 80
    targetPort: 80
  type: ClusterIP