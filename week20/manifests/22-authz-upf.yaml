apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: upf-allow-smf-only
  namespace: 5g-core
spec:
  selector:
    matchLabels:
      app: upf
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/5g-core/sa/default"
    when:
    - key: source.labels[app]
      values:
      - smf
    to:
    - operation:
        methods:
        - GET
        - POST