# D:\week19\manifests\edge\upf-deployment.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: upf-config
  namespace: 5g-edge
  labels:
    app: upf
    nf-type: UPF
    project: week19-mec
    tier: edge
data:
  COMPONENT: "UPF-Edge"
  EDGE_SITE: "edge-site-1"
  N4_SMF_ADDR: "smf.5g-cloud.svc.cluster.local"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: upf
  namespace: 5g-edge
  labels:
    app: upf
    nf-type: UPF
    project: week19-mec
    tier: edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: upf
  template:
    metadata:
      labels:
        app: upf
        nf-type: UPF
        tier: edge
    spec:
      containers:
      - name: upf
        image: nginx:alpine
        ports:
        - containerPort: 8805
          name: pfcp
          protocol: UDP
        - containerPort: 2152
          name: gtpu
          protocol: UDP
        env:
        - name: COMPONENT
          value: "UPF-Edge"
        - name: EDGE_SITE
          value: "edge-site-1"
        - name: N4_SMF_ADDR
          value: "smf.5g-cloud.svc.cluster.local"
        - name: DNN_EDGE
          value: "edge-mec"
        - name: MEC_VIDEO_HOST
          value: "mec-video-server.mec-apps.svc.cluster.local"
        - name: MEC_V2X_HOST
          value: "mec-v2x-server.mec-apps.svc.cluster.local"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: upf
  namespace: 5g-edge
  labels:
    app: upf
    nf-type: UPF
    project: week19-mec
    tier: edge
spec:
  selector:
    app: upf
  ports:
  - port: 8805
    targetPort: 8805
    name: pfcp
    protocol: UDP
  - port: 2152
    targetPort: 2152
    name: gtpu
    protocol: UDP