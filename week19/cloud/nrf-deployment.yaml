apiVersion: v1
kind: ConfigMap
metadata:
  name: nrf-config
  namespace: 5g-cloud
  labels:
    app: nrf
    nf-type: NRF
    project: week19-mec
data:
  COMPONENT: "NRF-CloudCore"
  SBI_PORT: "7777"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nrf
  namespace: 5g-cloud
  labels:
    app: nrf
    nf-type: NRF
    project: week19-mec
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nrf
  template:
    metadata:
      labels:
        app: nrf
        nf-type: NRF
    spec:
      containers:
      - name: nrf
        image: nginx:alpine
        ports:
        - containerPort: 7777
          name: sbi
        env:
        - name: COMPONENT
          valueFrom:
            configMapKeyRef:
              name: nrf-config
              key: COMPONENT
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: nrf
  namespace: 5g-cloud
  labels:
    app: nrf
    nf-type: NRF
    project: week19-mec
spec:
  selector:
    app: nrf
  ports:
  - port: 7777
    targetPort: 80
    name: sbi